<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>404 — A32F Tech</title>
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Fraunces:opsz,wght@9..144,400&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0a0a0a; --border: #1a2218; --border-strong: #243024;
  --text: #d8e0d6; --text-dim: #8a978a; --text-faint: #5a655a;
  --accent: #00cc00; --mono: 'JetBrains Mono', ui-monospace, monospace;
  --display: 'Fraunces', Georgia, serif;
}
html, body { height: 100%; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--mono);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 2rem;
  -webkit-font-smoothing: antialiased;
}
.grid-bg {
  position: fixed; inset: 0;
  background-image:
    linear-gradient(rgba(36,48,36,0.5) 1px, transparent 1px),
    linear-gradient(90deg, rgba(36,48,36,0.5) 1px, transparent 1px);
  background-size: 60px 60px;
  opacity: 0.4; pointer-events: none;
  mask-image: radial-gradient(ellipse at center, black 30%, transparent 70%);
  -webkit-mask-image: radial-gradient(ellipse at center, black 30%, transparent 70%);
}
.card {
  position: relative; z-index: 1;
  border: 1px solid var(--border-strong);
  padding: 3rem 3.5rem;
  max-width: 480px;
  width: 100%;
  text-align: center;
}
.code {
  font-family: var(--display);
  font-size: clamp(4rem, 15vw, 7rem);
  line-height: 1;
  color: var(--accent);
  opacity: 0.3;
  margin-bottom: 1rem;
  letter-spacing: -0.04em;
}
.label {
  font-size: 0.7rem;
  color: var(--text-faint);
  letter-spacing: 0.2em;
  text-transform: uppercase;
  margin-bottom: 1rem;
}
p {
  font-size: 0.85rem;
  color: var(--text-dim);
  line-height: 1.6;
  margin-bottom: 2rem;
}
a {
  display: inline-flex;
  align-items: center;
  gap: 0.5rem;
  padding: 0.75rem 1.25rem;
  border: 1px solid var(--border-strong);
  color: var(--text);
  text-decoration: none;
  font-size: 0.8rem;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  transition: border-color 0.15s, color 0.15s;
}
a:hover { border-color: var(--accent); color: var(--accent); }
</style>
</head>
<body>
<div class="grid-bg"></div>
<div class="card">
  <div class="code">404</div>
  <div class="label">Page not found</div>
  <p>That page doesn't exist. You may have followed a broken link or mistyped the address.</p>
  <a href="/">← Back to A32F Tech</a>
</div>
</body>
</html>
